<!doctype html>
<html>
<head>

  <title>UK Early-Career Cloud Physics Group</title> 
  <meta charset="utf-8" name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://use.fontawesome.com/releases/v5.2.0/css/all.css" media="screen" rel="stylesheet" type="text/css" />
  <link href="https://uk-cloud-physics-group.github.io/css/frame.css" media="screen" rel="stylesheet" type="text/css" />
  <link href="https://uk-cloud-physics-group.github.io/css/controls.css" media="screen" rel="stylesheet" type="text/css" />
  <link href="https://uk-cloud-physics-group.github.io/css/custom.css" media="screen" rel="stylesheet" type="text/css" />
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,700" rel="stylesheet" type="text/css">
  <link href="https://fonts.googleapis.com/css?family=Open+Sans+Condensed:300,700" rel="stylesheet" type="text/css">
  <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:400,700" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="https://uk-cloud-physics-group.github.io/js/menu.js"></script>
  <script src="https://uk-cloud-physics-group.github.io/js/footer.js"></script>

  <style>
    .menu-symposium-posters {
      color: rgb(255, 255, 255) !important;
      opacity: 1 !important;
      font-weight: 700 !important;
    }

    .bottom-two-column {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .bottom-two-column .column {
      flex: 1 1 320px;
    }

    .bottom-two-column img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>

<!-------------------------------------------------------------------------------------------->
<body>
  <div class="menu-container"></div>
  <div class="content-container">
    <!-------------------------------------------------------------------------------------------->
    <!-- start header -->
    <div class="banner" style="background: url('https://uk-cloud-physics-group.github.io/img/clouds_2025_lilli_freischem-landscape.jpeg') no-repeat center; background-size: cover; height: 300px;"></div>
    <div class="banner">
      <div class="banner-table flex-column">
        <div class="flex-row">
          <div class="flex-item flex-column">
            <div style="text-align: center;">
              <h2 class="add-top-margin-small">UK Early-Career Cloud Physics Group Symposium</h2>
              <h2 class="add-top-margin-small">Poster presentations 2026</h2>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- end header -->
    <!-------------------------------------------------------------------------------------------->
    <!-- start content -->
    <div class="content">
      <div class="content-table flex-column">
        <div class="flex-row">
          <div class="flex-item flex-column">     
            <h2></h2><hr>
            <div class="bottom-two-column">
              <div class="column">
                <div id="poster-container" style="display:flex; gap:20px; flex-wrap:wrap;"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- end content -->
  </div>
  <div class="footer-container"></div>
<script>
  
async function loadPosters() {
  const res = await fetch('https://uk-cloud-physics-group.github.io/symposium_posters_2026/flist.json');
  const posters = await res.json();

  const container = document.getElementById('poster-container');

  posters.forEach(p => {
    const item = document.createElement('div');
    item.style.flex = '1 1 320px';

    item.innerHTML = `
      <h3>${p.title}</h3>
      <iframe src="${p.file}" style="width:100%; height:400px; border:none;"></iframe>
    `;

    container.appendChild(item);
  });
}

loadPosters();
</script>
  
</body>
</html>
